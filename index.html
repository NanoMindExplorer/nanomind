<!DOCTYPE html>
<html lang="id">
<head>

  <style>

      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;

<body>
  <div id="root">

      <div class="spin"></div>

    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
  /* ================================================================
     PORTFOLIO — GitHub Pages Edition
     Data disimpan di: portfolio-data.json (via GitHub API)
     Fallback: localStorage
     
     CARA DEPLOY:
     1. Upload file ini sebagai index.html di repo GitHub kamu
     2. Aktifkan GitHub Pages di Settings → Pages → main branch
     3. Buka portfolio, klik ⚙ → hubungkan GitHub → masuk Admin Mode
     4. Edit profil, tambah project & link!
  ================================================================ */

  const { useState, useEffect, useRef, useCallback } = React;

  // ── CONSTANTS ──────────────────────────────────────────────
  const DATA_KEY = "folio_v1";
  const GH_KEY   = "folio_gh";
  const FILE     = "portfolio-data.json";

  const DEFAULTS = {
    profile: {
      name: "Nama Anda",
      title: "Creative Developer & Designer",
      bio: "Membangun pengalaman digital yang indah dan bermakna. Klik ⚙ lalu aktifkan Admin Mode untuk mulai mengedit.",
      avatar: "",
      social: { github: "", twitter: "", linkedin: "", email: "" }
    },
    categories: ["Web App", "Design", "Mobile", "Open Source"],
    projects: [
      { id: "s1", title: "E-Commerce Platform",  description: "Toko online dengan fitur lengkap: inventory real-time, payment gateway, dan dashboard admin yang powerful.", image: "", category: "Web App",  tags: ["React","Node.js","MongoDB"],   liveUrl: "", githubUrl: "", featured: true,  year: "2024" },
      { id: "s2", title: "Design System",         description: "Sistem desain komprehensif dengan 50+ komponen, dark mode, dan dokumentasi lengkap untuk tim.",            image: "", category: "Design",   tags: ["Figma","React","Storybook"],   liveUrl: "", githubUrl: "", featured: false, year: "2024" },
      { id: "s3", title: "Mobile Fitness App",    description: "Aplikasi fitness lintas platform dengan rekomendasi workout bertenaga AI dan analitik progres harian.",     image: "", category: "Mobile",   tags: ["React Native","Python","AWS"], liveUrl: "", githubUrl: "", featured: false, year: "2023" }
    ],
    links: [
      { id: "l1", title: "MDN Web Docs", description: "Referensi terbaik untuk HTML, CSS, dan JavaScript",  url: "https://developer.mozilla.org", category: "Learning",  tags: ["docs","reference"] },
      { id: "l2", title: "Dribbble",     description: "Platform inspirasi desain UI/UX terbaik dunia",      url: "https://dribbble.com",          category: "Inspirasi", tags: ["design","ui"]      },
      { id: "l3", title: "GitHub",       description: "Platform pengembangan software terkemuka",            url: "https://github.com",            category: "Tools",     tags: ["dev","git"]        }
    ]
  };

  // ── STORAGE (localStorage) ─────────────────────────────────
  async function storeLoad() {
    try { const v = localStorage.getItem(DATA_KEY); return v ? JSON.parse(v) : null; } catch { return null; }
  }
  async function storeSave(data) {
    try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); return true; } catch { return false; }
  }
  function cfgLoad()    { try { const v = localStorage.getItem(GH_KEY); return v ? JSON.parse(v) : null; } catch { return null; } }
  function cfgSave(cfg) { try { localStorage.setItem(GH_KEY, JSON.stringify(cfg)); } catch {} }
  function cfgClear()   { try { localStorage.removeItem(GH_KEY); } catch {} }

  // ── GITHUB API ─────────────────────────────────────────────
  async function ghLoad(cfg) {
    const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${FILE}`, {
      headers: { Authorization: `Bearer ${cfg.token}`, Accept: "application/vnd.github.v3+json" }
    });
    if (r.status === 404) return { data: null, sha: null };
    if (!r.ok) throw new Error(`GitHub ${r.status}`);
    const f = await r.json();
    const decoded = decodeURIComponent(escape(atob(f.content.replace(/\n/g, ""))));
    return { data: JSON.parse(decoded), sha: f.sha };
  }
  async function ghSave(cfg, sha, data) {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${FILE}`, {
      method: "PUT",
      headers: { Authorization: `Bearer ${cfg.token}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
      body: JSON.stringify({ message: sha ? "✏️ Update portfolio" : "🎉 Init portfolio", content, ...(sha && { sha }) })
    });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || `GitHub ${r.status}`); }
    return (await r.json()).content.sha;
  }

  // ── UTILS ──────────────────────────────────────────────────
  const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  const fav  = (url) => { try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; } catch { return null; } };
  const arr  = (v) => Array.isArray(v) ? v : (v || "").split(",").map(t => t.trim()).filter(Boolean);
  const str2 = (v) => Array.isArray(v) ? v.join(", ") : (v || "");

  // ── GLOBAL CSS ─────────────────────────────────────────────
  const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070e;--s1:rgba(255,255,255,0.04);--s2:rgba(255,255,255,0.07);--b:rgba(255,255,255,0.08);--bh:rgba(255,255,255,0.14);--txt:#e2e8f0;--mu:#64748b;--mu2:#475569;--p:#7c3aed;--pl:#a78bfa;--c:#06b6d4;--g:#10b981;--pk:#ec4899;--am:#f59e0b;--r:#ef4444}
html{scroll-behavior:smooth}

.sy{font-family:'Syne',sans-serif}.mn{font-family:'JetBrains Mono',monospace}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;animation:drift var(--d,12s) ease-in-out infinite alternate}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.94)}to{opacity:1;transform:none}}
.glass{background:var(--s1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--b);border-radius:16px;transition:border-color .25s,box-shadow .25s,transform .25s}
.gh:hover{transform:translateY(-5px);box-shadow:0 24px 48px rgba(124,58,237,.14);border-color:rgba(124,58,237,.32)}
.grad{background:linear-gradient(135deg,var(--pl) 0%,var(--c) 55%,var(--pk) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn-p{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,var(--p),var(--c));border:none;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s,transform .2s,box-shadow .2s;white-space:nowrap}
.btn-p:hover{opacity:.88;transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,.4)}
.btn-p:active{transform:translateY(0)}
.btn-g{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;background:transparent;border:1px solid var(--b);color:var(--mu);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-g:hover{border-color:var(--p);color:var(--txt)}
.btn-d{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.22);color:var(--r);font-family:'Inter',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-d:hover{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4)}
.inp{width:100%;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--b);color:var(--txt);font-size:14px;font-family:'Inter',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
.inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
.inp::placeholder{color:var(--mu2)}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:.04em;font-family:'JetBrains Mono',monospace;background:rgba(124,58,237,.14);color:var(--pl);border:1px solid rgba(124,58,237,.24)}
.pill{padding:6px 16px;border-radius:100px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--b);background:transparent;color:var(--mu);font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}

.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s ease}
.modal{background:#0c0c18;border:1px solid var(--b);border-radius:20px;width:100%;max-width:540px;max-height:88vh;overflow-y:auto;animation:slideUp .2s ease}
.soc{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;border:1px solid var(--b);background:var(--s1);color:var(--mu);text-decoration:none;transition:all .2s;flex-shrink:0}
.soc:hover{border-color:var(--p);color:var(--pl);background:rgba(124,58,237,.12);transform:translateY(-2px)}
.abar{position:fixed;top:0;left:0;right:0;z-index:200;height:3px;background:linear-gradient(90deg,var(--p),var(--c),var(--pk),var(--p));background-size:200% 100%;animation:shimmer 2s linear infinite}
.toast{position:fixed;bottom:24px;right:24px;z-index:300;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;animation:toastIn .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.ts{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:var(--g)}
.te{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:var(--r)}
.ti{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);color:var(--pl)}
.grid-p{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.grid-l{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.sec{animation:slideUp .35s ease}
nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b);background:rgba(7,7,14,.88)}
.tog{width:44px;height:24px;border-radius:12px;background:var(--bh);position:relative;transition:background .2s;border:none;cursor:pointer;flex-shrink:0}
.tog.on{background:var(--p)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on::after{transform:translateX(20px)}
.gl{height:1px;background:linear-gradient(90deg,transparent,var(--p),var(--c),transparent);opacity:.22;margin:20px 0}
.cfm{padding:14px 16px;border-radius:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:12px}
@media(max-width:640px){.grid-p,.grid-l{grid-template-columns:1fr}.hn{font-size:clamp(32px,10vw,76px) !important}}
`;

  // ── ICONS ──────────────────────────────────────────────────

  // ── SMALL COMPONENTS ───────────────────────────────────────
  const Toast = ({ msg, type = "success" }) => (
    <div className={`toast ${type === "success" ? "ts" : type === "error" ? "te" : "ti"}`}>
      {type === "success" ? "✓" : type === "error" ? "✕" : "ℹ"} {msg}

  );
  const Tog = ({ on, onClick }) => <button className={`tog ${on ? "on" : ""}`} onClick={onClick} />;
  const F   = ({ label, hint, children }) => (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#94a3b8", marginBottom: 6, letterSpacing: ".04em", textTransform: "uppercase" }}>

      </label>
      {children}
    </div>
  );
  const Mbox = ({ title, children, onClose, w = 540 }) => (
    <div className="backdrop" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal" style={{ maxWidth: w }}>
        <div style={{ padding: "22px 24px 0", display: "flex", justifyContent: "space-between", alignItems: "center" }}>

          <button className="btn-g" onClick={onClose} style={{ padding: 7 }}><Ic.X style={{ width: 15, height: 15 }} /></button>
        </div>
        <div style={{ padding: "18px 24px 26px" }}>{children}</div>
      </div>
    </div>
  );
  const Empty = ({ icon, title, sub, cta }) => (
    <div style={{ textAlign: "center", padding: "72px 20px" }}>
      <div style={{ fontSize: 50, marginBottom: 14 }}>{icon}</div>
      <div className="sy" style={{ fontSize: 18, fontWeight: 700, color: "#e2e8f0", marginBottom: 8 }}>{title}</div>

      {cta}

  );

  // ── MODALS ─────────────────────────────────────────────────
  function ProfileModal({ profile, onSave, onClose }) {
    const [f, setF] = useState({ ...profile, social: { ...profile.social } });
    const s  = (k, v) => setF(x => ({ ...x, [k]: v }));
    const ss = (k, v) => setF(x => ({ ...x, social: { ...x.social, [k]: v } }));
    return (
      <Mbox title="Edit Profil" onClose={onClose}>

  // ── MAIN APP ───────────────────────────────────────────────
  function App() {
    const [data,    setData]  = useState(null);
    const [loading, setLoad]  = useState(true);
    const [saving,  setSave]  = useState(false);
    const [ghCfg,   setGhCfg] = useState(null);
    const [ghSha,   setGhSha] = useState(null);
    const [admin,   setAdmin] = useState(false);
    const [modal,   setModal] = useState(null);
    const [editItm, setEit]   = useState(null);
    const [sec,     setSec]   = useState("projects");
    const [filt,    setFilt]  = useState("All");
    const [toast,   setToast] = useState(null);
    const [fclk,    setFclk]  = useState(0);
    const ftm = useRef(null);

    const notify = useCallback((msg, type = "success") => {
      setToast({ msg, type });
      setTimeout(() => setToast(null), 3200);
    }, []);

    useEffect(() => {
      (async () => {
        const cfg = cfgLoad();
        if (cfg) setGhCfg(cfg);
        if (cfg) {
          try {
            const { data: d, sha } = await ghLoad(cfg);
            if (d) { setData(d); setGhSha(sha); setLoad(false); return; }
          } catch (e) { console.warn("GH load:", e.message); }
        }
        setData(await storeLoad() || DEFAULTS);
        setLoad(false);
      })();
    }, []);

    useEffect(() => {
      if (data?.profile?.name) document.title = `${data.profile.name} — Portfolio`;
    }, [data?.profile?.name]);

    const save = useCallback(async (nd) => {
      setSave(true); setData(nd);
      await storeSave(nd);
      if (ghCfg) {
        try { const ns = await ghSave(ghCfg, ghSha, nd); setGhSha(ns); notify("✓ Tersimpan di GitHub!"); }
        catch (e) { notify(`GitHub: ${e.message}`, "error"); }
      } else { notify("✓ Tersimpan!"); }
      setSave(false);
    }, [ghCfg, ghSha, notify]);

    const footerClick = () => {
      clearTimeout(ftm.current);
      const n = fclk + 1;
      if (n >= 5) { setAdmin(true); setFclk(0); notify("🔓 Admin mode aktif!", "info"); }
      else { setFclk(n); ftm.current = setTimeout(() => setFclk(0), 2000); }
    };

    if (loading) return (
      <>
        <style>{CSS}</style>
        <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14 }}>
          <div style={{ width: 36, height: 36, border: "3px solid rgba(124,58,237,.3)", borderTopColor: "#7c3aed", borderRadius: "50%", animation: "spin2 .8s linear infinite" }} />
          <span style={{ color: "var(--mu)", fontSize: 13 }}>Memuat portfolio…</span>
        </div>
      </>
    );

    const { profile, projects = [], links = [], categories = [] } = data;
    const allCats = ["All", ...categories];
    const shown   = filt === "All" ? projects : projects.filter(p => p.category === filt);
    const openM   = (type, item = null) => { setEit(item); setModal(type); };
    const handleSaveProj = async (proj) => { const fp = { ...proj, id: proj.id || uid() }; const np = editItm ? projects.map(p => p.id === fp.id ? fp : p) : [...projects, fp]; await save({ ...data, projects: np }); setModal(null); };
    const handleSaveLink = async (lk) => { const fl = { ...lk, id: lk.id || uid() }; const nl = editItm ? links.map(l => l.id === fl.id ? fl : l) : [...links, fl]; await save({ ...data, links: nl }); setModal(null); };

    return (
      <>
        <style>{CSS}</style>
        <div className="orb" style={{ width: 700, height: 700, top: -150, left: -200, background: "#7c3aed", opacity: .1, "--d": "14s" }} />
        <div className="orb" style={{ width: 500, height: 500, top: "42%", right: -180, background: "#06b6d4", opacity: .07, "--d": "10s", animationDelay: "4s" }} />
        <div className="orb" style={{ width: 400, height: 400, bottom: 60, left: "22%", background: "#ec4899", opacity: .05, "--d": "17s", animationDelay: "8s" }} />
        {admin && <div className="abar" />}
        {toast && <Toast {...toast} />}

        <nav style={{ marginTop: admin ? 3 : 0 }}>
          <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px", height: 58, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: "linear-gradient(135deg,#7c3aed,#06b6d4)", animation: "pulse 2s ease infinite" }} />
              <span className="sy" style={{ fontSize: 15, fontWeight: 700, color: "#f1f5f9" }}>{profile.name || "Portfolio"}</span>
              {admin  && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: "100px", background: "rgba(239,68,68,.14)", color: "var(--r)", border: "1px solid rgba(239,68,68,.28)", fontFamily: "JetBrains Mono", fontWeight: 700 }}>ADMIN</span>}
              {ghCfg && <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: "100px", background: "rgba(16,185,129,.1)", color: "var(--g)", border: "1px solid rgba(16,185,129,.22)", fontFamily: "JetBrains Mono" }}>GH ✓</span>}
            </div>
            <div style={{ display: "flex", gap: 7, alignItems: "center" }}>
              {saving && <span style={{ fontSize: 11, color: "#334155", fontFamily: "JetBrains Mono" }}>saving…</span>}

          </div>
        </nav>

        <main style={{ maxWidth: 1100, margin: "0 auto", padding: "0 24px 80px" }}>
          <section style={{ padding: "80px 0 60px", borderBottom: "1px solid rgba(255,255,255,.055)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 26 }}>
              <div style={{ width: 66, height: 66, borderRadius: "50%", overflow: "hidden", border: "2px solid rgba(124,58,237,.4)", display: "flex", alignItems: "center", justifyContent: "center", background: "linear-gradient(135deg,#7c3aed,#06b6d4)", flexShrink: 0 }}>
                {profile.avatar ? <img src={profile.avatar} alt="" style={{ width: "100%", height: "100%", objectFit: "cover" }} onError={e => e.target.style.display = "none"} /> : <span className="sy" style={{ fontSize: 24, fontWeight: 800, color: "#fff" }}>{(profile.name || "?")[0].toUpperCase()}</span>}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#10b981", boxShadow: "0 0 8px #10b981", animation: "pulse 2.2s ease infinite" }} />
                  <span style={{ fontSize: 13, color: "#10b981", fontWeight: 500 }}>Available for work</span>
                </div>
                <span style={{ fontSize: 12, color: "var(--mu2)", fontFamily: "JetBrains Mono" }}>{projects.length} projects · {links.length} links</span>
              </div>
              {admin && <button className="btn-g" onClick={() => openM("profile")} style={{ marginLeft: "auto", fontSize: 12 }}><Ic.Edit style={{ width: 12, height: 12 }} />Edit Profil</button>}
            </div>
            <h1 className="sy hn" style={{ fontSize: "clamp(40px, 7vw, 76px)", fontWeight: 800, lineHeight: 1.05, color: "#f1f5f9", marginBottom: 12, letterSpacing: "-1.5px" }}>{profile.name || "Nama Anda"}</h1>
            <div className="grad sy" style={{ fontSize: "clamp(18px, 3vw, 27px)", fontWeight: 700, marginBottom: 20 }}>{profile.title || "Creative Developer"}</div>
            <p style={{ fontSize: 16, color: "var(--mu)", lineHeight: 1.75, maxWidth: 560, marginBottom: 34 }}>{profile.bio}</p>
            <div style={{ display: "flex", gap: 9, flexWrap: "wrap" }}>
              {profile.social?.github   && <a href={profile.social.github}            target="_blank" rel="noopener noreferrer" className="soc"><Ic.GH style={{ width: 17, height: 17 }} /></a>}
              {profile.social?.twitter  && <a href={profile.social.twitter}           target="_blank" rel="noopener noreferrer" className="soc"><Ic.TW style={{ width: 17, height: 17 }} /></a>}
              {profile.social?.linkedin && <a href={profile.social.linkedin}          target="_blank" rel="noopener noreferrer" className="soc"><Ic.LI style={{ width: 17, height: 17 }} /></a>}
              {profile.social?.email    && <a href={`mailto:${profile.social.email}`} className="soc"><Ic.ML style={{ width: 17, height: 17 }} /></a>}
              {admin && !Object.values(profile.social || {}).some(Boolean) && <button className="btn-g" onClick={() => openM("profile")} style={{ fontSize: 12 }}>+ Tambah Social Links</button>}
            </div>
          </section>

          <div style={{ display: "flex", gap: 2, padding: "14px 0", borderBottom: "1px solid rgba(255,255,255,.055)" }}>
            {[{ id: "projects", label: "Projects", count: projects.length, icon: "💻" }, { id: "links", label: "Saved Links", count: links.length, icon: "🔗" }].map(t => (
              <button key={t.id} onClick={() => setSec(t.id)} style={{ padding: "8px 18px", borderRadius: 8, border: "none", cursor: "pointer", fontFamily: "Syne, sans-serif", fontSize: 14, fontWeight: 600, transition: "all .2s", background: sec === t.id ? "rgba(124,58,237,.12)" : "transparent", color: sec === t.id ? "var(--pl)" : "var(--mu)", borderBottom: `2px solid ${sec === t.id ? "var(--p)" : "transparent"}` }}>
                {t.icon} {t.label} <span style={{ marginLeft: 7, fontSize: 11, padding: "2px 7px", borderRadius: "100px", background: sec === t.id ? "rgba(124,58,237,.2)" : "rgba(255,255,255,.04)", color: sec === t.id ? "var(--pl)" : "#334155" }}>{t.count}</span>
              </button>
            ))}
          </div>

          {sec === "projects" && (
            <div className="sec" style={{ paddingTop: 30 }}>
              <div style={{ display: "flex", gap: 7, marginBottom: 26, flexWrap: "wrap", alignItems: "center" }}>
                {allCats.map(c => <button key={c} className={`pill ${filt === c ? "on" : ""}`} onClick={() => setFilt(c)}>{c}</button>)}
                {admin && <button className="btn-p" style={{ marginLeft: "auto", fontSize: 13, padding: "8px 15px" }} onClick={() => openM("project")}><Ic.Plus style={{ width: 15, height: 15 }} />Tambah Project</button>}
              </div>
              {shown.length === 0
                ? <Empty icon="💻" title="Belum ada project" sub={admin ? "Tambahkan project pertamamu." : "Project akan muncul di sini."} cta={admin && <button className="btn-p" onClick={() => openM("project")}><Ic.Plus style={{ width: 15, height: 15 }} />Tambah Sekarang</button>} />
                : <div className="grid-p">{shown.map(p => <ProjectCard key={p.id} p={p} admin={admin} onEdit={i => openM("project", i)} onDel={async id => await save({ ...data, projects: projects.filter(x => x.id !== id) })} onFeat={async id => await save({ ...data, projects: projects.map(x => x.id === id ? { ...x, featured: !x.featured } : x) })} />)}</div>
              }
            </div>
          )}
          {sec === "links" && (
            <div className="sec" style={{ paddingTop: 30 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 22 }}>
                <div>
                  <h2 className="sy" style={{ fontSize: 22, fontWeight: 700, color: "#e2e8f0" }}>Saved Links</h2>
                  <p style={{ fontSize: 14, color: "var(--mu)", marginTop: 4 }}>Resource & bookmark yang dikurasi</p>
                </div>
                {admin && <button className="btn-p" style={{ fontSize: 13, padding: "8px 15px" }} onClick={() => openM("link")}><Ic.Plus style={{ width: 15, height: 15 }} />Tambah Link</button>}
              </div>
              {links.length === 0
                ? <Empty icon="🔗" title="Belum ada link" sub={admin ? "Mulai simpan resource." : "Link akan muncul di sini."} cta={admin && <button className="btn-p" onClick={() => openM("link")}><Ic.Plus style={{ width: 15, height: 15 }} />Tambah Sekarang</button>} />
                : <div className="grid-l">{links.map(l => <LinkCard key={l.id} lk={l} admin={admin} onEdit={i => openM("link", i)} onDel={async id => await save({ ...data, links: links.filter(x => x.id !== id) })} />)}</div>
              }
            </div>
          )}
        </main>

        <footer style={{ borderTop: "1px solid rgba(255,255,255,.05)", padding: "24px", textAlign: "center" }}>
          <span onClick={footerClick} style={{ fontSize: 13, cursor: "default", userSelect: "none", transition: "color .3s", color: fclk > 0 ? "var(--p)" : "#1e293b" }}>
            © {new Date().getFullYear()} {profile.name || "Portfolio"} · Made with ❤️ · Hosted on GitHub Pages
          </span>
          {fclk > 0 && fclk < 5 && <div style={{ fontSize: 11, color: "var(--pl)", marginTop: 5, fontFamily: "JetBrains Mono" }}>{5 - fclk} klik lagi untuk admin mode…</div>}
        </footer>

        {modal === "profile"  && <ProfileModal  profile={profile} onSave={async p => { await save({ ...data, profile: p }); setModal(null); }} onClose={() => setModal(null)} />}
        {modal === "project"  && <ProjectModal  item={editItm} categories={categories} onSave={handleSaveProj} onClose={() => setModal(null)} />}
        {modal === "link"     && <LinkModal     item={editItm} onSave={handleSaveLink} onClose={() => setModal(null)} />}
        {modal === "settings" && <SettingsModal ghCfg={ghCfg} adminMode={admin} onToggleAdmin={() => setAdmin(a => !a)} onConnect={cfg => { setGhCfg(cfg); setGhSha(null); cfgSave(cfg); notify("✓ GitHub terhubung!"); }} onDisconnect={() => { setGhCfg(null); setGhSha(null); cfgClear(); notify("GitHub terputus", "info"); }} onReset={async () => { await save(DEFAULTS); notify("Reset ke demo", "info"); }} onClear={async () => { await save({ ...DEFAULTS, projects: [], links: [] }); notify("Data dihapus", "info"); }} onClose={() => setModal(null)} />}
      </>
    );
  }

  // ── RENDER ─────────────────────────────────────────────────
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
